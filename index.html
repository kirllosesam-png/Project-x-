<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ربط واتساب - كرولس</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #075E54; color: white; text-align: center; padding: 20px; }
        .card { background: white; color: #333; padding: 20px; border-radius: 20px; max-width: 400px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .qr-img { width: 220px; border: 1px solid #eee; margin: 15px 0; }
        .pairing-box { background: #f0f0f0; padding: 15px; border-radius: 10px; margin-top: 15px; border: 2px dashed #25D366; }
        #code-display { font-size: 32px; font-weight: bold; color: #128C7E; letter-spacing: 5px; margin: 10px 0; }
        input { width: 80%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px; text-align: center; }
        button { background: #25D366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2>توصيل واتساب 📱</h2>

    <div class="card">
        <h3>1. امسح الكود</h3>
        <img id="qr" class="qr-img" src="" alt="جاري تحميل QR...">
        
        <hr>

        <h3>2. أو اربط بالرقم</h3>
        <p style="font-size: 12px;">دخل رقمك (بالكود الدولي) عشان يظهر الكود</p>
        <input type="text" id="phone" placeholder="2010xxxxxxxx">
        <button onclick="requestCode()">إظهار كود الرقم</button>
        
        <div class="pairing-box">
            <p>كود الربط الخاص بك:</p>
            <div id="code-display">- - - - - - - -</div>
        </div>
    </div>

    <script>
        const socket = io();
        
        function requestCode() {
            const num = document.getElementById('phone').value;
            if(num) {
                document.getElementById('code-display').innerText = "جاري الطلب...";
                socket.emit('requestPairingCode', num);
            }
        }

        socket.on('qr', (url) => { document.getElementById('qr').src = url; });
        
        socket.on('pairingCode', (code) => {
            // الكود اللي هيظهر هنا هو اللي هتكتبه في موبايلك
            document.getElementById('code-display').innerText = code;
        });

        socket.on('ready', () => {
            document.body.innerHTML = "<h1 style='color:white'>✅ مبروك! واتساب متصل الآن</h1>";
        });
    </script>
</body>
</html>
